<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Industrial Login | Salesforce Job Radar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e1117;
            --ln-blue: #0077b5;
            --text: #ffffff;
            --muted: #8b949e;
            --border: #30363d;
            --card-bg: #161b22;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .logo { font-size: 1.8rem; font-weight: 700; color: var(--ln-blue); margin-bottom: 0.5rem; text-align: center; }
        .title { font-size: 1.2rem; font-weight: 600; margin-bottom: 2rem; text-align: center; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: white; cursor: pointer; margin-bottom: 12px; font-weight: 500; transition: 0.2s; }
        .social-btn:hover { background: rgba(255,255,255,0.05); }
        .divider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 0.75rem; margin: 1.5rem 0; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .input-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; font-size: 0.8rem; margin-bottom: 6px; color: var(--muted); }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: white; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--ln-blue); }
        .btn-submit { width: 100%; background: var(--ln-blue); color: white; border: none; border-radius: 8px; padding: 12px; font-weight: 700; cursor: pointer; margin-top: 1rem; }
        .footer { margin-top: 2rem; text-align: center; font-size: 0.8rem; color: var(--muted); }
        .footer a { color: var(--ln-blue); text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">LinkedIn</div>
        <div class="title">Sign in to Cloud Sync</div>
        
        <button class="social-btn" onclick="socialLogin('Google')">
            <img src="https://www.google.com/favicon.ico" width="18"> Continue with Google
        </button>
        <button class="social-btn" onclick="socialLogin('Apple')">
            <img src="https://www.apple.com/favicon.ico" width="18"> Continue with Apple
        </button>

        <div class="divider">or</div>

        <form id="authForm">
            <div class="input-group">
                <label>Email or Phone</label>
                <input type="text" id="user" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="pass" required>
            </div>
            <button type="submit" class="btn-submit" id="btnSync">Sign In</button>
        </form>

        <div class="footer">
            <a href="https://www.linkedin.com/checkpoint/rp/request-password-reset">Forgot password?</a><br><br>
            <a href="/">← Back to Dashboard</a>
        </div>
    </div>
    <script>
        async function socialLogin(platform) {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = `🔄 Cloud Syncing with ${platform}...`;
            btn.disabled = true;

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token') || localStorage.getItem('gsi_token');

            try {
                const res = await fetch('/api/profile/sync-cloud', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ platform: 'LinkedIn (' + platform + ')', user: 'Social User' })
                });
                if (res.ok) {
                    btn.innerHTML = `✅ ${platform} Sync Success!`;
                    setTimeout(() => { window.location.href = '/'; }, 1500);
                }
            } catch (e) {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert('Social sync failed. Please try manual login.');
            }
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSync');
            btn.textContent = '🔄 Syncing...';
            
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token') || localStorage.getItem('gsi_token');

            const res = await fetch('/api/profile/sync-cloud', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ platform: 'LinkedIn', user: document.getElementById('user').value })
            });
            if (res.ok) { window.location.href = '/'; }
        });
    </script>
</body>
</html>
