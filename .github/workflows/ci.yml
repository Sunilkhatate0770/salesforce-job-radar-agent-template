name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run test suite
        run: npm test
        env:
          NODE_ENV: test
          # Minimal env vars for test execution
          GOOGLE_CLIENT_ID: test-client-id
          JOB_RADAR_GITHUB_REPO: ${{ github.repository }}

      - name: Verify Vercel config
        run: |
          echo "Verifying vercel.json is valid JSON..."
          node -e "JSON.parse(require('fs').readFileSync('vercel.json','utf8')); console.log('✅ vercel.json is valid');"

      - name: Check for large files
        run: |
          echo "Checking for files over 500KB..."
          find . -name 'node_modules' -prune -o -name '.git' -prune -o -type f -size +500k -print | head -20
          echo "✅ Large file check complete"

      - name: Summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: All passed ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Audit: Completed" >> $GITHUB_STEP_SUMMARY
