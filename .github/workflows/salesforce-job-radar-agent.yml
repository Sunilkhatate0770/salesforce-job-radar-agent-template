name: Salesforce Job Radar Agent

on:
  schedule:
    - cron: "*/30 * * * *"   # Poll every 30 minutes; shared lease still prevents overlap
  workflow_dispatch:
    inputs:
      dispatch_source:
        description: "manual or external-scheduler"
        required: false
        default: "manual"
      force_run:
        description: "Set true to bypass external/manual scheduling controls"
        required: false
        default: "false"

concurrency:
  group: salesforce-job-radar-agent
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Restore local agent state cache
        uses: actions/cache/restore@v5
        with:
          path: .cache
          key: salesforce-job-radar-state-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            salesforce-job-radar-state-${{ github.ref_name }}-

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Load shared runtime defaults
        run: node scripts/render-cloud-env.js github-env >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Load environment variables
        run: |
          function set_env() {
            echo "$1<<EOF" >> $GITHUB_ENV
            echo "$2" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          }

          EMAIL_TO_VALUE="${{ secrets.EMAIL_TO }}"
          RESEND_TO_VALUE="${{ secrets.RESEND_TO }}"
          TELEGRAM_CHAT_ID_VALUE="${{ secrets.TELEGRAM_CHAT_ID }}"
          if [ -z "$RESEND_TO_VALUE" ]; then
            RESEND_TO_VALUE="$EMAIL_TO_VALUE"
          fi
          if [ -z "$TELEGRAM_CHAT_ID_VALUE" ]; then
            TELEGRAM_CHAT_ID_VALUE="${{ vars.TELEGRAM_CHAT_ID }}"
          fi

          set_env "APIFY_TOKEN" "${{ secrets.APIFY_TOKEN }}"
          set_env "TELEGRAM_BOT_TOKEN" "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          set_env "TELEGRAM_CHAT_ID" "$TELEGRAM_CHAT_ID_VALUE"
          set_env "SUPABASE_URL" "${{ secrets.SUPABASE_URL }}"
          set_env "SUPABASE_SERVICE_KEY" "${{ secrets.SUPABASE_SERVICE_KEY }}"
          set_env "SMTP_USER" "${{ secrets.SMTP_USER }}"
          set_env "SMTP_PASS" "${{ secrets.SMTP_PASS }}"
          set_env "EMAIL_FROM" "${{ secrets.EMAIL_FROM }}"
          set_env "EMAIL_TO" "$EMAIL_TO_VALUE"
          set_env "RESEND_API_KEY" "${{ secrets.RESEND_API_KEY }}"
          set_env "RESEND_FROM" "${{ secrets.RESEND_FROM }}"
          set_env "RESEND_TO" "$RESEND_TO_VALUE"
          set_env "RESEND_REPLY_TO" "${{ secrets.RESEND_REPLY_TO }}"
          set_env "ADZUNA_APP_ID" "${{ secrets.ADZUNA_APP_ID }}"
          set_env "ADZUNA_APP_KEY" "${{ secrets.ADZUNA_APP_KEY }}"
          set_env "RESUME_SKILLS" "${{ secrets.RESUME_SKILLS }}"
          set_env "RESUME_EXPERIENCE_YEARS" "${{ secrets.RESUME_EXPERIENCE_YEARS }}"
          set_env "RESUME_TARGET_ROLE" "${{ secrets.RESUME_TARGET_ROLE }}"
          set_env "RESUME_TEXT" "${{ secrets.RESUME_TEXT }}"
          set_env "OPENAI_API_KEY" "${{ secrets.OPENAI_API_KEY }}"


      - name: Validate email provider configuration
        timeout-minutes: 3
        run: |
          RESEND_RECIPIENT="${RESEND_TO:-$EMAIL_TO}"
          if [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASS" ] || [ -z "$EMAIL_FROM" ] || [ -z "$EMAIL_TO" ]; then
            if [ -z "$RESEND_API_KEY" ] || [ -z "$RESEND_FROM" ] || [ -z "$RESEND_RECIPIENT" ]; then
              echo "ERROR: No email provider configured. Set SMTP_* or RESEND_* secrets." >&2
              echo "  Required (SMTP): SMTP_USER, SMTP_PASS, EMAIL_FROM, EMAIL_TO" >&2
              echo "  Or (Resend): RESEND_API_KEY, RESEND_FROM, RESEND_TO or EMAIL_TO" >&2
              exit 1
            fi
          fi

      - name: Debug required secret presence
        run: |
          print_secret_status() {
            if [ -n "${!1}" ]; then
              echo "$1 set: yes"
            else
              echo "$1 set: no"
            fi
          }

          print_secret_status SUPABASE_URL
          print_secret_status SUPABASE_SERVICE_KEY
          print_secret_status TELEGRAM_BOT_TOKEN
          print_secret_status TELEGRAM_CHAT_ID
          print_secret_status OPENAI_API_KEY
          print_secret_status APIFY_TOKEN
          print_secret_status SMTP_USER
          print_secret_status EMAIL_TO
          print_secret_status RESEND_API_KEY
          print_secret_status RESEND_FROM
          print_secret_status RESEND_TO

      - name: Validate notifier and Supabase config
        timeout-minutes: 5
        run: npm run doctor

      - name: Validate shared lease config
        timeout-minutes: 5
        env:
          SCHEDULER_MODE: always
        run: npm run doctor:cloud

      - name: Debug env configuration
        run: |
          echo "SMTP_HOST set: ${SMTP_HOST:+yes}"
          echo "SMTP_PORT set: ${SMTP_PORT:+yes}"
          echo "SMTP_USER set: ${SMTP_USER:+yes}"
          echo "SMTP_PASS set: ${SMTP_PASS:+yes}"
          echo "EMAIL_FROM set: ${EMAIL_FROM:+yes}"
          echo "EMAIL_TO set: ${EMAIL_TO:+yes}"
          echo "RESEND_API_KEY set: ${RESEND_API_KEY:+yes}"
          echo "RESEND_FROM set: ${RESEND_FROM:+yes}"
          echo "RESEND_TO set: ${RESEND_TO:+yes}"

      - name: Run Salesforce Job Radar Agent
        timeout-minutes: 25
        run: node src/run.js

      - name: Process tailored resume pack follow-up queue
        if: success()
        timeout-minutes: 5
        run: node src/tools/processResumePackQueue.js

      - name: Save local agent state cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .cache
          key: salesforce-job-radar-state-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
