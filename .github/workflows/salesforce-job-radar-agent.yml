name: Salesforce Job Radar Agent

on:
  schedule:
    - cron: "*/5 * * * *"   # Poll every 5 minutes; gate keeps effective cadence near 10 minutes
  workflow_dispatch:
    inputs:
      dispatch_source:
        description: "manual or external-scheduler"
        required: false
        default: "manual"
      force_run:
        description: "Set true to bypass external/manual scheduling controls"
        required: false
        default: "false"

concurrency:
  group: salesforce-job-radar-agent
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore local agent state cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: salesforce-job-radar-state-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            salesforce-job-radar-state-${{ github.ref_name }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Load shared runtime defaults
        run: node scripts/render-cloud-env.js github-env >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Load environment variables
        run: |
          echo "APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}" >> $GITHUB_ENV
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> $GITHUB_ENV
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> $GITHUB_ENV
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> $GITHUB_ENV
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> $GITHUB_ENV
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> $GITHUB_ENV
          echo "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" >> $GITHUB_ENV
          echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> $GITHUB_ENV
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> $GITHUB_ENV
          echo "RESEND_FROM=${{ secrets.RESEND_FROM }}" >> $GITHUB_ENV
          echo "RESEND_REPLY_TO=${{ secrets.RESEND_REPLY_TO }}" >> $GITHUB_ENV
          echo "ADZUNA_APP_ID=${{ secrets.ADZUNA_APP_ID }}" >> $GITHUB_ENV
          echo "ADZUNA_APP_KEY=${{ secrets.ADZUNA_APP_KEY }}" >> $GITHUB_ENV
          echo "RESUME_SKILLS=${{ secrets.RESUME_SKILLS }}" >> $GITHUB_ENV
          echo "RESUME_EXPERIENCE_YEARS=${{ secrets.RESUME_EXPERIENCE_YEARS }}" >> $GITHUB_ENV
          echo "RESUME_TARGET_ROLE=${{ secrets.RESUME_TARGET_ROLE }}" >> $GITHUB_ENV
          echo "RESUME_TEXT=${{ secrets.RESUME_TEXT }}" >> $GITHUB_ENV
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV

      - name: Validate email provider configuration
        run: |
          if [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASS" ] || [ -z "$EMAIL_FROM" ] || [ -z "$EMAIL_TO" ]; then
            if [ -z "$RESEND_API_KEY" ] || [ -z "$RESEND_FROM" ] || [ -z "$RESEND_TO" ]; then
              echo "ERROR: No email provider configured. Set SMTP_* or RESEND_* secrets." >&2
              echo "  Required (SMTP): SMTP_USER, SMTP_PASS, EMAIL_FROM, EMAIL_TO" >&2
              echo "  Or (Resend): RESEND_API_KEY, RESEND_FROM, RESEND_TO" >&2
              exit 1
            fi
          fi

      - name: Validate notifier and Supabase config
        run: npm run doctor

      - name: Validate shared lease config
        env:
          SCHEDULER_MODE: always
        run: npm run doctor:cloud

      - name: Debug env configuration
        run: |
          echo "SMTP_HOST set: ${SMTP_HOST:+yes}"
          echo "SMTP_PORT set: ${SMTP_PORT:+yes}"
          echo "SMTP_USER set: ${SMTP_USER:+yes}"
          echo "SMTP_PASS set: ${SMTP_PASS:+yes}"
          echo "EMAIL_FROM set: ${EMAIL_FROM:+yes}"
          echo "EMAIL_TO set: ${EMAIL_TO:+yes}"
          echo "RESEND_API_KEY set: ${RESEND_API_KEY:+yes}"
          echo "RESEND_FROM set: ${RESEND_FROM:+yes}"
          echo "RESEND_TO set: ${RESEND_TO:+yes}"

      - name: Run Salesforce Job Radar Agent
        run: node src/run.js

      - name: Save local agent state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: salesforce-job-radar-state-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
