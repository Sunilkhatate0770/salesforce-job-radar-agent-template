<div class="page-header">
  <div>
    <div class="page-title" style="display:flex; align-items:center; gap:12px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:24px;height:24px;color:var(--blue);"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
      Master Study History
    </div>
    <div class="page-sub" style="border:none; margin:0; padding:0;">Day-by-day breakdown of your preparation journey.</div>
  </div>
  <button id="syncHistoryBtn" onclick="syncHistoryWithFeedback()" class="tracker-tab active sync-btn-header" style="background:var(--blue); color:white; border:none; padding:10px 20px; box-shadow:0 4px 15px rgba(79,142,247,0.3); display:flex; align-items:center; gap:10px; min-width:160px; justify-content:center;">
    <span id="syncIcon" style="display:flex; align-items:center; justify-content:center; transition: transform 0.5s;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
    </span> 
    <span id="syncText">Sync Dashboard</span>
  </button>
</div>

<div class="stats-row" style="margin-bottom:1.5rem;">
  <div class="stat-box"><div class="stat-value" id="historyAvgTime">0h 0m</div><div class="stat-label">Daily Average</div></div>
  <div class="stat-box"><div class="stat-value" id="historyTotalTime">0h 0m</div><div class="stat-label">Period Total</div></div>
  <div class="stat-box"><div class="stat-value" id="historyDayCount">0</div><div class="stat-label">Days Studied</div></div>
</div>

<div style="background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:2rem;">
  <div class="history-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; border-bottom:1px solid var(--border); padding-bottom:15px; flex-wrap:wrap; gap:15px;">
    <div class="history-tabs" style="display:flex; gap:8px; flex-wrap:wrap;">
      <button class="history-tab active" onclick="switchHistoryTab('timeline')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> Timeline</button>
      <button class="history-tab" onclick="switchHistoryTab('table')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;"><path d="M3 3h18v18H3z"></path><path d="M3 9h18"></path><path d="M3 15h18"></path><path d="M9 3v18"></path><path d="M15 3v18"></path></svg> Table</button>
      <button class="history-tab" onclick="switchHistoryTab('analytics')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;"><path d="M18 20V10"></path><path d="M12 20V4"></path><path d="M6 20v-6"></path></svg> Analytics</button>
    </div>
    <select id="historyPeriodFilter" onchange="resetHistoryPageAndRender()" style="background:var(--bg); color:var(--text); border:1px solid var(--border); padding:0.4rem 0.8rem; border-radius:6px; font-family:inherit; font-size:0.85rem;">
      <option value="today">Today Only</option>
      <option value="yesterday">Yesterday</option>
      <option value="current_month" selected>Current Month (Live)</option>
      <option value="last3">Last 3 Months</option>
      <option value="year">Full Year (2026)</option>
    </select>
  </div>
  <div id="historyTimeline">
    <!-- Content will be injected based on view mode -->
  </div>
</div>
