<div class="page-header">
  <div class="page-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;vertical-align:middle;margin-right:10px;"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg> AI Interview Room</div>
  <div class="page-sub">Interactive practice sessions with real-time feedback from your AI agent.</div>
</div>

<div style="background:var(--card); border:1px solid var(--border); border-radius:12px; height:600px; display:flex; flex-direction:column; overflow:hidden;">
  <!-- Interview Config -->
  <div id="interviewSetup" style="padding:1.5rem; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.02);">
    <div style="display:flex; gap:20px; align-items:center;">
      <div style="flex:1;">
        <label style="display:block; font-size:0.75rem; color:var(--muted); margin-bottom:5px;">Pick Interview Topic</label>
        <select id="interviewTopic" style="width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border); padding:0.6rem; border-radius:6px;">
          <option value="Apex & Technical">Apex & Technical Development</option>
          <option value="LWC & Frontend">LWC & Frontend Engineering</option>
          <option value="Architecture & Scenarios">Architecture & Complex Scenarios</option>
          <option value="Behavioral & HR">Behavioral & STAR Method</option>
        </select>
      </div>
      <div style="flex:1;">
        <label style="display:block; font-size:0.75rem; color:var(--muted); margin-bottom:5px;">Difficulty Level</label>
        <select id="interviewDifficulty" style="width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border); padding:0.6rem; border-radius:6px;">
          <option value="Junior">Junior / Mid-Level</option>
          <option value="Senior" selected>Senior Technical Architect</option>
          <option value="Expert">Subject Matter Expert (Hard)</option>
        </select>
      </div>
      <button onclick="startAIInterview()" style="background:var(--blue); color:white; border:none; padding:0.8rem 2rem; border-radius:8px; font-weight:700; cursor:pointer; margin-top:1.5rem;">Start Session</button>
    </div>
  </div>

  <!-- Chat Interface -->
  <div id="interviewChat" style="flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:1.5rem;">
    <div style="text-align:center; color:var(--muted); margin-top:100px;">
      <div style="font-size:3rem; margin-bottom:1rem; color:var(--blue);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:80px;height:80px;"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg></div>
      <h3>Welcome to the Interview Room</h3>
      <p>Your AI engine is ready to challenge you.</p>
    </div>
  </div>

  <!-- Input Area -->
  <div id="interviewInputArea" style="padding:1.5rem; border-top:1px solid var(--border); display:none;">
    <div style="display:flex; gap:10px;">
      <textarea id="userAnswerInput" placeholder="Type or speak your answer here..." style="flex:1; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:1rem; min-height:80px; font-family:inherit; resize:none;"></textarea>
      <button id="micBtn" onclick="toggleVoiceInput()" style="background:var(--card); color:var(--text); border:1px solid var(--border); padding:0 1.5rem; border-radius:8px; cursor:pointer; font-size:1.5rem; display:flex; align-items:center; justify-content:center; transition: all 0.3s;" title="Use Voice to Answer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg></button>
      <button onclick="submitAnswer()" style="background:var(--green); color:black; border:none; padding:0 2rem; border-radius:8px; font-weight:700; cursor:pointer;">Submit<br>Answer</button>
    </div>
    <div style="font-size:0.7rem; color:var(--muted); margin-top:8px; display:flex; justify-content:space-between;">
      <span>Press Ctrl+Enter to submit</span>
      <span id="aiThinkingStatus" style="display:none; color:var(--blue);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;vertical-align:middle;margin-right:4px;"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path></svg> Gemma is thinking...</span>
    </div>
  </div>
</div>
